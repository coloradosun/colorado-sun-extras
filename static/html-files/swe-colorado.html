<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snow Water Equivalent — Colorado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Libre Franklin', Arial, sans-serif;
    background: #fff;
    display: flex;
    flex-direction: column;
    padding: 16px 16px 0;
  }
  #chart-header { margin-bottom: 8px; }
  #chart-header h2 {
    font-size: clamp(15px, 3.5vw, 20px);
    font-weight: 700;
    color: #111;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  #chart-header .subtitle { font-size: clamp(10px, 2vw, 11px); color: #888; margin-bottom: 8px; }
  #stat-cards { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .stat-card {
    display: flex; align-items: center; gap: 6px;
    border-radius: 4px; padding: 4px 10px;
    font-size: clamp(10px, 2vw, 11px); color: #fff; white-space: nowrap;
  }
  .stat-card .chip-label { opacity: 0.85; font-weight: 500; }
  .stat-card .chip-value { font-weight: 700; font-size: clamp(11px, 2.5vw, 13px); }
  .stat-red    { background: #c0392b; }
  .stat-yellow { background: #9a7d0a; }
  .stat-green  { background: #1a7a40; }
  #container { width: 100%; aspect-ratio: 16 / 9; min-height: 320px; }
  #chart-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 14px; border-top: 1px solid #eee;
    margin-top: 8px; min-height: 52px;
  }
  #chart-footer .source { font-size: 10px; color: #888; }
  #chart-footer .source a { color: #555; text-decoration: underline; text-underline-offset: 2px; }
  #chart-footer .source a:hover { color: #111; }
  #chart-footer .logo a { display: block; line-height: 0; }
  #chart-footer .logo img { height: 28px; width: auto; opacity: 0.85; }
  #chart-footer .logo img:hover { opacity: 1; }
  @media (max-width: 600px) {
    body { padding: 10px 10px 0; }
    #container { aspect-ratio: 1 / 1; min-height: 300px; }
    #chart-footer {
      flex-direction: column; align-items: flex-start;
      gap: 8px; min-height: auto; padding: 10px 0 12px;
    }
  }
  /* Embed mode: fit everything within viewport */
  html.embed-mode, html.embed-mode body {
    height: 100%; overflow: hidden;
  }
  html.embed-mode body {
    padding: 12px 12px 0;
  }
  html.embed-mode #container {
    flex: 1 1 auto;
    aspect-ratio: unset;
    min-height: 0;
  }
  html.embed-mode #chart-header { margin-bottom: 6px; }
  html.embed-mode #chart-header h2 { font-size: clamp(12px, 2.5vw, 16px); margin-bottom: 2px; }
  html.embed-mode #chart-header .subtitle { margin-bottom: 4px; }
  html.embed-mode #chart-footer { padding: 8px 0 10px; margin-top: 4px; min-height: auto; }
  html.embed-mode #chart-footer .logo img { height: 22px; }
  /* Mobile embed: maximize chart space */
  @media (max-width: 600px) {
    html.embed-mode body { padding: 8px 8px 0; }
    html.embed-mode #chart-header { margin-bottom: 4px; }
    html.embed-mode #chart-header h2 { font-size: 12px; }
    html.embed-mode #chart-header .subtitle { font-size: 9px; margin-bottom: 2px; }
    html.embed-mode #stat-cards { gap: 4px; margin-bottom: 2px; }
    html.embed-mode .stat-card { padding: 2px 6px; font-size: 9px; }
    html.embed-mode .stat-card .chip-value { font-size: 10px; }
    html.embed-mode #chart-footer { padding: 4px 0 6px; margin-top: 2px; }
    html.embed-mode #chart-footer .source { font-size: 8px; }
    html.embed-mode #chart-footer .logo img { height: 16px; }
  }
</style>
<script>
  // Detect if loaded in an iframe and apply embed mode
  if (window.self !== window.top) {
    document.documentElement.classList.add('embed-mode');
  }
</script>
</head>
<body>

<div id="chart-header">
  <h2>Colorado Snow Water Equivalent Projection</h2>
  <div class="subtitle" id="chart-subtitle"></div>
  <div id="stat-cards"></div>
</div>
<div id="container"></div>
<div id="chart-footer">
  <div class="source">
    Source: <a href="https://www.wcc.nrcs.usda.gov/ftpref/support/states/CO/products/#state=co&element=wteq" target="_blank" rel="noopener">USDA NRCS Colorado Snow Water Equivalent</a>
  </div>
  <div class="logo">
    <a href="https://coloradosun.com" target="_blank" rel="noopener">
      <img src="https://i0.wp.com/newspack-coloradosun.s3.amazonaws.com/wp-content/uploads/2024/11/cropped-black-text-transparent-bg.png?w=800&quality=80&ssl=1" alt="The Colorado Sun">
    </a>
  </div>
</div>

function valAt(data, x) {
  for (var i = 0; i < data.length; i++) {
    if (data[i][0] === x && data[i][1] !== null) return data[i][1];
  }
  for (var d = 1; d < 15; d++) {
    for (var i = 0; i < data.length; i++) {
      if (data[i][0] === x + d && data[i][1] !== null) return data[i][1];
      if (data[i][0] === x - d && data[i][1] !== null) return data[i][1];
    }
  }
  return null;
}

// ============================================================
// ANNOTATIONS with connector lines
// Solid lineStyle → swatch inside label + solid border
// Dashed lineStyle → dashed border only (no swatch; compact)
// ============================================================
function drawAnnotations(chart) {
  if (chart.annotationGroup) chart.annotationGroup.destroy();
  chart.annotationGroup = chart.renderer.g('annotations').attr({ zIndex: 20 }).add();

  const xAxis  = chart.xAxis[0];
  const yAxis  = chart.yAxis[0];
  const ren    = chart.renderer;
  const FONT     = CONFIG.fontFamily;
  const BASE_FS  = CONFIG.annotationFontSize;  // baseline px
  const PAD    = 5;   // label box padding px
  const SWATCH = 18;  // line swatch width px
  const GAP    = 4;   // gap between swatch and text

  function drawLabel(ann) {
    if (ann.anchorY === null || ann.anchorY === undefined) return;

    const anchorPx = xAxis.toPixels(ann.anchorX, false);
    const anchorPy = yAxis.toPixels(ann.anchorY, false);
    const labelPx  = xAxis.toPixels(ann.labelX,  false);
    const labelPy  = yAxis.toPixels(ann.labelY,  false);

    // --- Measure text to size the box ---
    const fs = ann.fontScale != null ? (BASE_FS * ann.fontScale / 100) : BASE_FS;
    const fsPx = fs + 'px';
    const tempText = ren.text(ann.label, -9999, -9999)
      .css({ fontSize: fsPx, fontWeight: ann.bold ? '700' : '500', fontFamily: FONT })
      .add(chart.annotationGroup);
    const bb = tempText.getBBox();
    tempText.destroy();

    const textW = bb.width;
    const textH = bb.height;
    const dashedBorder = ann.lineStyle === 'dashed';
    const boxW  = dashedBorder ? PAD + textW + PAD : PAD + SWATCH + GAP + textW + PAD;
    const boxH  = textH + PAD * 2;

    // Box top-left
    const bx = labelPx - boxW / 2;
    const by = labelPy - boxH / 2;

    // --- Background box (border style mirrors the line style) ---
    ren.rect(bx, by, boxW, boxH, 3)
      .attr({
        fill: '#ffffff',
        stroke: ann.color,
        'stroke-width': 1.5,
        'stroke-dasharray': dashedBorder ? '4,3' : 'none',
        zIndex: 9
      })
      .add(chart.annotationGroup);

    if (!dashedBorder) {
      // --- Line swatch for solid-border labels ---
      const swatchY  = by + boxH / 2;
      const swatchX1 = bx + PAD;
      const swatchX2 = swatchX1 + SWATCH;
      ren.path(['M', swatchX1, swatchY, 'L', swatchX2, swatchY])
        .attr({
          stroke: ann.color,
          'stroke-width': ann.bold ? 2.5 : 1.5,
          'stroke-dasharray': 'none',
          zIndex: 10
        })
        .add(chart.annotationGroup);

      // --- Label text (after swatch) ---
      ren.text(ann.label, swatchX2 + GAP, by + PAD + textH - 2)
        .attr({ zIndex: 10 })
        .css({
          color: ann.color,
          fontSize: fsPx,
          fontWeight: ann.bold ? '700' : '500',
          fontFamily: FONT
        })
        .add(chart.annotationGroup);
    } else {
      // --- Label text only (no swatch; border communicates line style) ---
      ren.text(ann.label, bx + PAD, by + PAD + textH - 2)
        .attr({ zIndex: 10 })
        .css({
          color: ann.color,
          fontSize: fsPx,
          fontWeight: ann.bold ? '700' : '500',
          fontFamily: FONT
        })
        .add(chart.annotationGroup);
    }

    // --- Connector line from nearest box edge to anchor point ---
    // Find closest point on box perimeter to anchor
    const boxCx = bx + boxW / 2;
    const boxCy = by + boxH / 2;
    const dx = anchorPx - boxCx;
    const dy = anchorPy - boxCy;
    const angle = Math.atan2(dy, dx);

    // Intersection with box edge
    const halfW = boxW / 2;
    const halfH = boxH / 2;
    let ex, ey;
    if (Math.abs(Math.cos(angle)) * halfH > Math.abs(Math.sin(angle)) * halfW) {
      ex = boxCx + (dx > 0 ? halfW : -halfW);
      ey = boxCy + Math.tan(angle) * (dx > 0 ? halfW : -halfW);
    } else {
      ey = boxCy + (dy > 0 ? halfH : -halfH);
      ex = boxCx + (dy > 0 ? halfH : -halfH) / Math.tan(angle);
    }

    ren.path(['M', ex, ey, 'L', anchorPx, anchorPy])
      .attr({
        stroke: ann.color,
        'stroke-width': 1,
        'stroke-dasharray': '3,2',
        zIndex: 8,
        opacity: 0.7
      })
      .add(chart.annotationGroup);
  }

  // Draw all configured annotations
  drawLabel(CONFIG.annotations.actual2026);
  drawLabel(CONFIG.annotations.projMax);
  drawLabel(CONFIG.annotations.projMedian);
  drawLabel(CONFIG.annotations.projMin);
  drawLabel(CONFIG.annotations.median9120);

  // Median Peak label (no connector — sits on the vertical line)
  const pk    = CONFIG.annotations.medianPeak;
  const pkPx  = xAxis.toPixels(CONFIG.medianPeak.peakDay, false);
  const pkPy  = yAxis.toPixels(pk.labelY, false);

  const pkFs = pk.fontScale != null ? (BASE_FS * pk.fontScale / 100) : BASE_FS;
  const pkFsPx = pkFs + 'px';
  const tempPk = ren.text(pk.label, -9999, -9999)
    .css({ fontSize: pkFsPx, fontWeight: '500', fontFamily: FONT })
    .add(chart.annotationGroup);
  const pkBB = tempPk.getBBox();
  tempPk.destroy();

  const pkBoxW = PAD + pkBB.width + PAD;
  const pkBoxH = pkBB.height + PAD * 2;
  const pkBx   = pkPx - pkBoxW / 2;
  const pkBy   = pkPy - pkBoxH / 2;

  ren.rect(pkBx, pkBy, pkBoxW, pkBoxH, 3)
    .attr({ fill: '#ffffff', stroke: pk.color, 'stroke-width': 1, zIndex: 9 })
    .add(chart.annotationGroup);

  ren.text(pk.label, pkBx + PAD, pkBy + PAD + pkBB.height - 2)
    .attr({ zIndex: 10 })
    .css({ color: pk.color, fontSize: pkFsPx, fontWeight: '500', fontFamily: FONT })
    .add(chart.annotationGroup);

  // Highlighted year labels at their peak points
  Object.keys(CONFIG.highlightYears).forEach(function(yr) {
    const h = CONFIG.highlightYears[yr];
    const yrData = yearData[yr];
    if (!yrData) return;
    let peakVal = -Infinity, peakX = 0;
    yrData.forEach(function(pt) {
      if (pt[1] !== null && pt[1] > peakVal) { peakVal = pt[1]; peakX = pt[0]; }
    });
    if (peakVal === -Infinity) return;
    const offX = h.labelOffsetX || 8;
    const offY = h.labelOffsetY || -10;
    drawLabel({
      label:     h.label,
      color:     h.color,
      bold:      false,
      lineStyle: 'solid',
      anchorX:   peakX,
      anchorY:   peakVal,
      labelX:    peakX,
      labelY:    peakVal,
      // override pixel position via post-offset — handled below
      _pixelOffsetX: offX,
      _pixelOffsetY: offY
    });
  });
}

// Reflow the chart whenever the container is resized (keeps aspect ratio correct when embedded)
new ResizeObserver(function() { chart.reflow(); }).observe(document.getElementById('container'));
</script>
</body>
